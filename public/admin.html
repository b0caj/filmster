<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Filmster - Admin Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Impact&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-[#0b0c10] text-white min-h-screen flex flex-col justify-between font-sans">

    <header class="flex justify-between items-center px-8 py-4 border-b border-gray-800">
        <div class="flex items-center gap-2">
            <span class="text-2xl">🛠️</span>
            <h1 class="text-2xl uppercase tracking-wider font-bold text-[#f5a623]">Filmster Admin</h1>
        </div>
        <div class="text-gray-400 text-sm">
            Fortschritt: <span id="progress-display" class="text-white font-bold">0 / 0</span>
        </div>
    </header>

    <main class="flex-1 flex flex-col items-center justify-center p-6 max-w-lg mx-auto w-full gap-6">
        <div class="w-full bg-[#16171e] border border-gray-800 p-8 rounded-2xl shadow-2xl flex flex-col gap-6">
            
            <div class="text-center">
                <span class="text-xs font-bold uppercase tracking-wider text-gray-500 block mb-1">Aktueller Film</span>
                <h2 id="movie-title" class="text-3xl font-bold text-white leading-tight">Lade...</h2>
                <p id="movie-year" class="text-lg text-[#f5a623] font-mono mt-1">0000</p>
            </div>

            <div class="flex justify-center">
                <button onclick="searchOnYouTube()" class="bg-[#ff0000] hover:bg-[#cc0000] text-white font-bold px-4 py-2 rounded-xl text-xs flex items-center gap-2 transition cursor-pointer">
                    🔺 Auf YouTube suchen
                </button>
            </div>

            <div class="border-t border-gray-800 my-2"></div>

            <div>
                <label class="block text-xs font-bold uppercase tracking-wider text-gray-400 mb-2">YouTube Video-ID</label>
                <input type="text" id="yt-id-input" placeholder="Z.B. 4wvpdBnfiZo (Nur die ID, nicht den ganzen Link!)" class="w-full bg-[#0b0c10] border border-gray-800 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-[#f5a623] font-mono text-sm">
                <p class="text-gray-500 text-[10px] mt-1">Hinweis: Die ID steht in der URL hinter "v=" (z.B. youtube.com/watch?v=<b>4wvpdBnfiZo</b>)</p>
            </div>

            <div>
                <label class="block text-xs font-bold uppercase tracking-wider text-gray-400 mb-2">Startsekunde (Optional)</label>
                <input type="number" id="start-input" value="0" min="0" class="w-full bg-[#0b0c10] border border-gray-800 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-[#f5a623] font-mono text-sm">
            </div>

            <button onclick="saveCurrentMovie()" class="w-full bg-[#f5a623] hover:bg-[#d48c16] text-black font-bold py-3 rounded-xl transition cursor-pointer text-sm uppercase tracking-wider">
                💾 Speichern & Nächster Film
            </button>
        </div>
    </main>

    <script>
        let currentMovie = null;

        async function loadNext() {
            document.getElementById('yt-id-input').value = "";
            document.getElementById('start-input').value = "0";

            const res = await fetch('/api/admin/next-empty');
            const data = await res.json();

            if (data.finished) {
                document.getElementById('movie-title').innerText = data.message;
                document.getElementById('movie-year').innerText = "";
                document.getElementById('yt-id-input').disabled = true;
                document.getElementById('start-input').disabled = true;
                return;
            }

            currentMovie = data;
            document.getElementById('movie-title').innerText = data.title;
            document.getElementById('movie-year').innerText = data.year;
            document.getElementById('progress-display').innerText = data.progress;
        }

        function searchOnYouTube() {
            if (!currentMovie) return;
            const query = encodeURIComponent(`${currentMovie.title} ${currentMovie.year} intro soundtrack theme`);
            window.open(`https://www.youtube.com/results?search_query=${query}`, '_blank');
        }

        async function saveCurrentMovie() {
            const ytId = document.getElementById('yt-id-input').value.trim();
            const startAt = document.getElementById('start-input').value.trim();

            if (!ytId) return alert("Bitte trage eine YouTube-ID ein!");

            // Daten an den Server senden
            const response = await fetch('/api/admin/update', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    title: currentMovie.title,
                    year: currentMovie.year,
                    youtubeId: ytId,
                    startAt: startAt
                })
            });

            const result = await response.json();
            if (result.success) {
                loadNext(); // Sofort den nächsten Film laden!
            } else {
                alert("Fehler beim Speichern!");
            }
        }

        // Beim Laden der Seite direkt den ersten Film anfordern
        loadNext();
    </script>
</body>
</html>
